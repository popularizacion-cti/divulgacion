<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canales de divulgación científica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #1e6c93; color: white; }
        .accent-line { background-color: #ffd700; } /* Dorado/Amarillo para resaltar en azul */
        .card-video { background-color: rgba(255, 255, 255, 0.1); backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2); transition: 0.3s; }
        .card-video:hover { background-color: rgba(255, 255, 255, 0.15); transform: translateY(-3px); }
        
        /* Control de filas: 2 filas por defecto */
        .grid-limited { max-height: 850px; overflow: hidden; transition: max-height 0.5s ease-in-out; }
        .grid-expanded { max-height: 5000px !important; }
        .section-content { transition: all 0.4s ease; }
        .hidden-section { display: none; }
        
        .btn-toggle { cursor: pointer; color: #ffd700; font-weight: 600; text-decoration: underline; margin-top: 20px; display: inline-block; }
        .section-header { cursor: pointer; user-select: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-7xl mx-auto text-center mb-12 border-b border-white/20 pb-10">
        <h1 class="text-4xl md:text-5xl font-bold mb-4 text-white">Canales de divulgación científica</h1>
        <p class="text-xl text-blue-100 font-light">Videos más recientes de los canales de divulgación científica más reconocidos y populares.</p>
    </header>

    <main class="max-w-7xl mx-auto">
        
        <section class="mb-16">
            <div class="section-header flex items-center mb-6 group" onclick="toggleSection('content-videos')">
                <div class="accent-line w-2 h-10 mr-4 rounded-full"></div>
                <h2 class="text-3xl font-bold">Videos Recientes <span class="text-sm font-normal opacity-50 group-hover:opacity-100">(Click para ocultar)</span></h2>
            </div>
            
            <div id="content-videos" class="section-content">
                <div id="grid-videos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 grid-limited">
                    </div>
                <button id="btn-more-videos" class="btn-toggle" onclick="expandGrid('grid-videos', this)">Ver más videos</button>
            </div>
        </section>

        <section class="mb-20">
            <div class="section-header flex items-center mb-6 group" onclick="toggleSection('content-shorts')">
                <div class="accent-line w-2 h-10 mr-4 rounded-full" style="background-color: #ff8c00;"></div>
                <h2 class="text-3xl font-bold">YouTube Shorts <span class="text-sm font-normal opacity-50 group-hover:opacity-100">(Click para ocultar)</span></h2>
            </div>

            <div id="content-shorts" class="section-content">
                <div id="grid-shorts" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 grid-limited" style="max-height: 700px;">
                    </div>
                <button id="btn-more-shorts" class="btn-toggle" onclick="expandGrid('grid-shorts', this)">Ver más shorts</button>
            </div>
        </section>

    </main>

    <script>
        // Función para ocultar/mostrar sección completa
        function toggleSection(id) {
            const content = document.getElementById(id);
            content.classList.toggle('hidden-section');
        }

        // Función para expandir/colapsar filas
        function expandGrid(gridId, btn) {
            const grid = document.getElementById(gridId);
            grid.classList.toggle('grid-expanded');
            btn.innerText = grid.classList.contains('grid-expanded') ? "Ocultar" : (gridId.includes('videos') ? "Ver más videos" : "Ver más shorts");
        }

        async function init() {
            try {
                const response = await fetch('videos.json?v=' + new Date().getTime());
                const data = await response.json();

                const videoGrid = document.getElementById('grid-videos');
                const shortGrid = document.getElementById('grid-shorts');

                // Render Videos
                data.videos.forEach(v => {
                    videoGrid.innerHTML += `
                        <div class="card-video rounded-xl overflow-hidden shadow-xl flex flex-col h-full">
                            <a href="${v.url}" target="_blank">
                                <img src="${v.backup_thumb}" onerror="this.src='${v.thumbnail}'" class="w-full aspect-video object-cover">
                                <div class="p-5">
                                    <p class="text-xs font-bold text-yellow-400 uppercase mb-1">${v.channelTitle}</p>
                                    <h3 class="text-lg font-semibold leading-tight mb-2 text-white">${v.title}</h3>
                                    <p class="text-[11px] text-blue-200 mb-3 italic">Publicado: ${v.publishedAt}</p>
                                    <p class="text-sm text-blue-50 opacity-80 line-clamp-2">${v.description}</p>
                                </div>
                            </a>
                        </div>
                    `;
                });

                // Render Shorts
                data.shorts.forEach(s => {
                    shortGrid.innerHTML += `
                        <div class="card-video rounded-lg overflow-hidden flex flex-col h-full">
                            <a href="${s.url}" target="_blank">
                                <img src="${s.backup_thumb}" class="w-full aspect-[9/16] object-cover opacity-90">
                                <div class="p-3">
                                    <p class="text-[10px] font-bold text-orange-400 uppercase truncate">${s.channelTitle}</p>
                                    <h3 class="text-[11px] font-medium leading-tight line-clamp-2 mt-1 text-white">${s.title}</h3>
                                    <p class="text-[9px] text-blue-200 mt-1">${s.publishedAt}</p>
                                </div>
                            </a>
                        </div>
                    `;
                });

            } catch (e) { console.error(e); }
        }
        init();
    </script>
</body>
</html>
