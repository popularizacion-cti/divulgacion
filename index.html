<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canales de divulgación científica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #1e6c93; color: white; margin: 0; padding: 0; scroll-behavior: smooth; }
        .accent-line { background-color: #ffd700; } 
        .card-video { background-color: rgba(255, 255, 255, 0.08); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.15); transition: 0.3s; height: 100%; }
        .card-video:hover { background-color: rgba(255, 255, 255, 0.15); transform: translateY(-4px); border-color: rgba(255,255,255,0.4); }
        
        /* Contenedores con desbordamiento oculto para el corte limpio */
        .grid-limited { overflow: hidden; transition: max-height 0.7s cubic-bezier(0.4, 0, 0.2, 1); max-height: 0; }
        .grid-expanded { max-height: 15000px !important; }
        
        .section-content { transition: all 0.4s ease; }
        .hidden-section { display: none; }
        
        .btn-toggle { cursor: pointer; color: #ffd700; font-weight: 600; text-decoration: underline; margin-top: 25px; display: inline-block; background: none; border: none; font-size: 1rem; transition: opacity 0.2s; }
        .btn-toggle:hover { opacity: 0.8; }
        .section-header { cursor: pointer; user-select: none; display: flex; align-items: center; }
        
        .img-short { aspect-ratio: 9/16; object-fit: cover; }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="max-w-5xl mx-auto text-center mb-6 border-b border-white/10 pb-4">
        <h1 class="text-2xl md:text-3xl font-bold mb-4 text-white uppercase tracking-tight">Canales de divulgación científica</h1>
    </header>

    <main class="max-w-4xl mx-auto">
        
        <section class="mb-6">
            <div class="section-header group" onclick="toggleSection('content-videos')">
                <div class="accent-line w-2.5 h-6 mr-4 rounded-full shadow-[0_0_10px_rgba(255,215,0,0.5)]"></div>
                <h2 class="text-xl font-bold tracking-wide">Videos Recientes</h2>
            </div>
            
            <div id="content-videos" class="section-content mt-6">
                <div id="grid-videos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 grid-limited">
                    </div>
                <button id="btn-more-videos" class="btn-toggle" onclick="expandGrid('grid-videos', this)">Ver más videos</button>
            </div>
        </section>

        <section class="mb-6">
            <div class="section-header group" onclick="toggleSection('content-shorts')">
                <div class="w-2.5 h-6 mr-4 rounded-full shadow-[0_0_10px_rgba(255,140,0,0.5)]" style="background-color: #ff8c00;"></div>
                <h2 class="text-xl font-bold tracking-wide">YouTube Shorts</h2>
            </div>

            <div id="content-shorts" class="section-content mt-6">
                <div id="grid-shorts" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-5 grid-limited">
                    </div>
                <button id="btn-more-shorts" class="btn-toggle" onclick="expandGrid('grid-shorts', this)">Ver más shorts</button>
            </div>
        </section>

    </main>

    <script>
        // Función para ocultar/mostrar sección completa
        function toggleSection(id) {
            const content = document.getElementById(id);
            content.classList.toggle('hidden-section');
        }

        // Función para expandir/colapsar filas
        // Variables globales para rastrear cuántas filas se muestran
        let filasVisiblesVideos = 2;
        let filasVisiblesShorts = 2;
        
        function expandGrid(gridId, btn) {
            const grid = document.getElementById(gridId);
            const isVideo = gridId.includes('videos');
            const items = grid.children;
            
            // Si el botón ya dice "Ocultar", ejecutamos el reset y salimos de la función
            if (btn.innerText === "Ocultar") {
                resetearGrid(grid, btn, isVideo);
                return; // Importante para que no ejecute lo de abajo
            }
        
            // Calcular columnas actuales
            let columns = 1;
            if (window.innerWidth >= 1024) columns = isVideo ? 3 : 6;
            else if (window.innerWidth >= 768) columns = isVideo ? 2 : 4;
            else columns = isVideo ? 1 : 2;
        
            const totalFilas = Math.ceil(items.length / columns);
            
            if (isVideo) {
                filasVisiblesVideos += 2;
                if (filasVisiblesVideos >= totalFilas) {
                    finalizarExpansion(grid, btn, "Ocultar");
                } else {
                    aplicarCortePorFilas(grid, columns, filasVisiblesVideos);
                }
            } else {
                filasVisiblesShorts += 2;
                if (filasVisiblesShorts >= totalFilas) {
                    finalizarExpansion(grid, btn, "Ocultar");
                } else {
                    aplicarCortePorFilas(grid, columns, filasVisiblesShorts);
                }
            }
        }
        
        function aplicarCortePorFilas(grid, columns, numFilas) {
            const items = grid.children;
            const indiceTarget = columns * numFilas;
            
            if (items[indiceTarget]) {
                const heightLimit = items[indiceTarget].offsetTop - grid.offsetTop - 10;
                grid.style.maxHeight = heightLimit + "px";
            } else {
                grid.style.maxHeight = "none";
            }
        }
        
        function finalizarExpansion(grid, btn, texto) {
            grid.style.maxHeight = "none";
            btn.innerText = texto;
        }
        
        function resetearGrid(grid, btn, isVideo) {
            if (isVideo) filasVisiblesVideos = 2; else filasVisiblesShorts = 2;
            ajustarCorteLimpio(grid); // Tu función original de corte inicial
            btn.innerText = isVideo ? "Ver más videos" : "Ver más shorts";
            window.scrollTo({ top: grid.parentElement.offsetTop - 100, behavior: 'smooth' });
        }

        // Función que calcula las 2 filas exactas
        function ajustarCorteLimpio(grid) {
            const items = grid.children;
            const isVideo = grid.id.includes('videos');
            
            let columns = 1;
            if (window.innerWidth >= 1024) columns = isVideo ? 3 : 6;
            else if (window.innerWidth >= 768) columns = isVideo ? 2 : 4;
            else columns = isVideo ? 1 : 2;

            if (items.length > columns * 2) {
                const targetItem = items[columns * 2]; // Primer item de la fila 3
                const gapOffset = 5; // Margen para que no se vea el borde superior de la fila 3
                const heightLimit = targetItem.offsetTop - grid.offsetTop - gapOffset;
                grid.style.maxHeight = heightLimit + "px";
            } else {
                grid.style.maxHeight = "none";
                const btnId = isVideo ? 'btn-more-videos' : 'btn-more-shorts';
                if(document.getElementById(btnId)) document.getElementById(btnId).style.display = 'none';
            }
        }

        async function init() {
            try {
                const response = await fetch('videos.json?v=' + new Date().getTime());
                const data = await response.json();

                const videoGrid = document.getElementById('grid-videos');
                const shortGrid = document.getElementById('grid-shorts');

                // Render Videos (Solo Título, Canal y Fecha)
                data.videos.forEach(v => {
                    videoGrid.innerHTML += `
                        <div class="card-video rounded-2xl overflow-hidden shadow-2xl flex flex-col">
                            <div class="relative aspect-video bg-black cursor-pointer group" 
                                 onclick="reemplazarPorVideo(this, '${v.videoId}')">
                                
                                <img src="${v.backup_thumb}" onerror="this.src='${v.thumbnail}'" 
                                     class="absolute w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity">
                                
                                <div class="absolute inset-0 flex items-center justify-center">
                                    <div class="w-14 h-14 bg-red-600 rounded-full flex items-center justify-center shadow-lg group-hover:scale-110 transition-transform">
                                        <svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24">
                                            <path d="M8 5v14l11-7z"/>
                                        </svg>
                                    </div>
                                </div>
                            </div>
                
                            <div class="p-4 flex-grow flex flex-col">
                                <p class="text-[11px] font-bold text-yellow-400 uppercase tracking-[0.2em] mb-1 opacity-90">${v.channelTitle}</p>
                                <a href="${v.url}" target="_blank">
                                    <h3 class="text-md font-semibold leading-tight text-white mb-2 line-clamp-2 hover:text-yellow-400 transition-colors">${v.title}</h3>
                                </a>
                                <div class="mt-auto pt-2 border-t border-white/5">
                                    <p class="text-[10px] text-blue-200 font-light italic">Publicado: ${v.publishedAt}</p>
                                </div>
                            </div>
                        </div>
                    `;
                });

                // Render Shorts
                data.shorts.forEach(s => {
                shortGrid.innerHTML += `
                    <div class="card-video rounded-xl overflow-hidden shadow-lg flex flex-col">
                        <div class="relative aspect-[9/16] bg-black cursor-pointer group" 
                             onclick="reemplazarPorVideo(this, '${s.videoId}')">
                            
                            <img src="${s.backup_thumb}" class="absolute w-full h-full object-cover opacity-85 group-hover:opacity-100 transition-opacity">
                            
                            <div class="absolute inset-0 flex items-center justify-center">
                                <div class="w-10 h-10 bg-red-600/90 rounded-full flex items-center justify-center shadow-lg group-hover:scale-110 transition-transform">
                                    <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24">
                                        <path d="M8 5v14l11-7z"/>
                                    </svg>
                                </div>
                            </div>
                        </div>
                        <div class="p-3">
                            <p class="text-[10px] font-bold text-orange-400 uppercase truncate mb-1">${s.channelTitle}</p>
                            <h3 class="text-[11px] font-medium leading-tight line-clamp-2 text-white/90 mb-1">${s.title}</h3>
                            <p class="text-[10px] text-blue-200 opacity-50">${s.publishedAt}</p>
                        </div>
                    </div>
                `;
                });

                // FORZAR CORTE: Pequeño delay para asegurar que el navegador calculó offsetTop
                setTimeout(() => {
                    ajustarCorteLimpio(videoGrid);
                    ajustarCorteLimpio(shortGrid);
                }, 400);

                // Re-calcular si el usuario cambia el tamaño de la ventana
                window.addEventListener('resize', () => {
                    if (!videoGrid.classList.contains('grid-expanded')) ajustarCorteLimpio(videoGrid);
                    if (!shortGrid.classList.contains('grid-expanded')) ajustarCorteLimpio(shortGrid);
                });

            } catch (e) { 
                console.error("Error cargando biblioteca:", e); 
            }
        }
        function reemplazarPorVideo(contenedor, videoId) {
            contenedor.innerHTML = `
                <iframe 
                    class="absolute top-0 left-0 w-full h-full"
                    src="https://www.youtube.com/embed/${videoId}?autoplay=1" 
                    title="YouTube video player" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    allowfullscreen>
                </iframe>
            `;
        }
        init();
    </script>
</body>
</html>
