<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canales de divulgación científica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #1e6c93; color: white; margin: 0; padding: 0; scroll-behavior: smooth; }
        .accent-line { background-color: #ffd700; } 
        .card-video { background-color: rgba(255, 255, 255, 0.08); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.15); transition: 0.3s; height: 100%; display: flex; flex-direction: column; }
        .card-video:hover { background-color: rgba(255, 255, 255, 0.15); transform: translateY(-4px); border-color: rgba(255,255,255,0.4); }
        
        .grid-limited { overflow: hidden; transition: max-height 0.7s cubic-bezier(0.4, 0, 0.2, 1); max-height: 0; }
        .grid-expanded { max-height: 20000px !important; }
        
        .section-content { transition: all 0.4s ease; }
        .hidden-section { display: none; }
        
        .btn-toggle { cursor: pointer; color: #ffd700; font-weight: 600; text-decoration: underline; margin-top: 20px; display: inline-block; background: none; border: none; font-size: 0.95rem; }
        .section-header { cursor: pointer; user-select: none; display: flex; align-items: center; }
        
        .video-facade:focus { outline: 3px solid #ffd700; outline-offset: 2px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-5xl mx-auto text-center mb-6 border-b border-white/10 pb-4">
        <h1 class="text-2xl md:text-3xl font-bold mb-2 text-white uppercase tracking-tight">Canales de divulgación científica</h1>
        <p class="text-xs md:text-sm text-blue-100 opacity-80 font-light">Videos más recientes de los canales de divulgación científica más reconocidos.</p>
    </header>

    <main class="max-w-5xl mx-auto">
        
        <section class="mb-10">
            <div class="section-header group" onclick="toggleSection('content-videos')">
                <div class="accent-line w-2 h-6 mr-4 rounded-full shadow-[0_0_10px_rgba(255,215,0,0.5)]"></div>
                <h2 class="text-xl font-bold tracking-wide">Videos Recientes</h2>
            </div>
            
            <div id="content-videos" class="section-content mt-6">
                <div id="grid-videos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 grid-limited"></div>
                <button id="btn-more-videos" class="btn-toggle" onclick="expandGrid('grid-videos', this)">Ver más videos</button>
            </div>
        </section>

        <section class="mb-10">
            <div class="section-header group" onclick="toggleSection('content-shorts')">
                <div class="w-2 h-6 mr-4 rounded-full shadow-[0_0_10px_rgba(255,140,0,0.5)]" style="background-color: #ff8c00;"></div>
                <h2 class="text-xl font-bold tracking-wide">YouTube Shorts</h2>
            </div>

            <div id="content-shorts" class="section-content mt-6">
                <div id="grid-shorts" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 grid-limited"></div>
                <button id="btn-more-shorts" class="btn-toggle" onclick="expandGrid('grid-shorts', this)">Ver más shorts</button>
            </div>
        </section>

    </main>

    <script>
        let filasVisiblesVideos = 2;
        let filasVisiblesShorts = 2;

        function toggleSection(id) {
            document.getElementById(id).classList.toggle('hidden-section');
        }

        function expandGrid(gridId, btn) {
            const grid = document.getElementById(gridId);
            const isVideo = gridId.includes('videos');
            
            if (btn.innerText === "Ocultar") {
                resetearGrid(grid, btn, isVideo);
                return;
            }

            const items = grid.children;
            let columns = window.innerWidth >= 1024 ? (isVideo ? 3 : 6) : (window.innerWidth >= 768 ? (isVideo ? 2 : 4) : (isVideo ? 1 : 2));
            const totalFilas = Math.ceil(items.length / columns);
            
            if (isVideo) {
                filasVisiblesVideos += 2;
                if (filasVisiblesVideos >= totalFilas) finalizarExpansion(grid, btn);
                else aplicarCortePorFilas(grid, columns, filasVisiblesVideos);
            } else {
                filasVisiblesShorts += 2;
                if (filasVisiblesShorts >= totalFilas) finalizarExpansion(grid, btn);
                else aplicarCortePorFilas(grid, columns, filasVisiblesShorts);
            }
        }

        function aplicarCortePorFilas(grid, columns, numFilas) {
            const items = grid.children;
            const indiceTarget = columns * numFilas;
            if (items[indiceTarget]) {
                grid.style.maxHeight = (items[indiceTarget].offsetTop - grid.offsetTop - 10) + "px";
            } else {
                grid.style.maxHeight = "none";
            }
        }

        function finalizarExpansion(grid, btn) {
            grid.style.maxHeight = "none";
            btn.innerText = "Ocultar";
        }

        function resetearGrid(grid, btn, isVideo) {
            if (isVideo) filasVisiblesVideos = 2; else filasVisiblesShorts = 2;
            ajustarCorteLimpio(grid);
            btn.innerText = isVideo ? "Ver más videos" : "Ver más shorts";
            const offset = grid.parentElement.getBoundingClientRect().top + window.pageYOffset - 50;
            window.scrollTo({ top: offset, behavior: 'smooth' });
        }

        function ajustarCorteLimpio(grid) {
            const isVideo = grid.id.includes('videos');
            const items = grid.children;
            let columns = window.innerWidth >= 1024 ? (isVideo ? 3 : 6) : (window.innerWidth >= 768 ? (isVideo ? 2 : 4) : (isVideo ? 1 : 2));

            if (items.length > columns * 2) {
                grid.style.maxHeight = (items[columns * 2].offsetTop - grid.offsetTop - 5) + "px";
            } else {
                grid.style.maxHeight = "none";
                document.getElementById(isVideo ? 'btn-more-videos' : 'btn-more-shorts').style.display = 'none';
            }
        }

        // Variable para rastrear el video que se está reproduciendo actualmente
        let videoActivo = null;
        
        function reemplazarPorVideo(contenedor, videoId) {
            // 1. Si ya había un video sonando en otro lado, lo volvemos a convertir en imagen
            if (videoActivo && videoActivo !== contenedor) {
                const viejoId = videoActivo.getAttribute('data-video-id');
                const viejaThumb = videoActivo.getAttribute('data-thumb');
                
                videoActivo.innerHTML = `
                    <img src="${viejaThumb}" class="absolute w-full h-full object-cover opacity-70 group-hover:opacity-100 transition-opacity">
                    <div class="absolute inset-0 flex items-center justify-center">
                        <div class="w-12 h-12 bg-red-600 rounded-full flex items-center justify-center group-hover:scale-110 transition-transform">
                            <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                    </div>
                `;
            }
        
            // 2. Guardamos los datos necesarios para poder restaurarlo después
            if (!contenedor.getAttribute('data-video-id')) {
                contenedor.setAttribute('data-video-id', videoId);
                contenedor.setAttribute('data-thumb', contenedor.querySelector('img').src);
            }
        
            // 3. Insertamos el nuevo video
            contenedor.innerHTML = `
                <iframe class="absolute top-0 left-0 w-full h-full" 
                        src="https://www.youtube.com/embed/${videoId}?autoplay=1" 
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen>
                </iframe>
            `;
        
            // 4. Marcamos este como el nuevo video activo
            videoActivo = contenedor;
        }

        async function init() {
            try {
                const response = await fetch('videos.json?v=' + new Date().getTime());
                const data = await response.json();
                const videoGrid = document.getElementById('grid-videos');
                const shortGrid = document.getElementById('grid-shorts');

                data.videos.forEach(v => {
                    videoGrid.innerHTML += `
                        <div class="card-video rounded-xl overflow-hidden shadow-lg">
                            <div class="relative aspect-video bg-black cursor-pointer group video-facade" tabindex="0" onclick="reemplazarPorVideo(this, '${v.videoId}')" onkeypress="if(event.key==='Enter') reemplazarPorVideo(this, '${v.videoId}')">
                                <img src="${v.thumbnail}" onerror="this.src='${v.backup_thumb}'" class="absolute w-full h-full object-cover opacity-70 group-hover:opacity-100 transition-opacity">
                                <div class="absolute inset-0 flex items-center justify-center"><div class="w-12 h-12 bg-red-600 rounded-full flex items-center justify-center group-hover:scale-110 transition-transform"><svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>
                            </div>
                            <div class="p-4 flex-grow flex flex-col">
                                <p class="text-[9px] font-bold text-yellow-400 uppercase mb-1">${v.channelTitle}</p>
                                <a href="${v.url}" target="_blank" class="hover:text-yellow-400"><h3 class="text-sm font-semibold leading-tight line-clamp-2 mb-2">${v.title}</h3></a>
                                <p class="text-[9px] text-blue-200 italic mt-auto border-t border-white/5 pt-2">Publicado: ${v.publishedAt}</p>
                            </div>
                        </div>`;
                });

                data.shorts.forEach(s => {
                    shortGrid.innerHTML += `
                        <div class="card-video rounded-lg overflow-hidden shadow-md">
                            <div class="relative aspect-[9/16] bg-black cursor-pointer group video-facade" tabindex="0" onclick="reemplazarPorVideo(this, '${s.videoId}')" onkeypress="if(event.key==='Enter') reemplazarPorVideo(this, '${s.videoId}')">
                                <img src="${s.backup_thumb}" class="absolute w-full h-full object-cover opacity-70 group-hover:opacity-100">
                                <div class="absolute inset-0 flex items-center justify-center"><div class="w-8 h-8 bg-red-600/90 rounded-full flex items-center justify-center"><svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>
                            </div>
                            <div class="p-2 flex-grow flex flex-col">
                                <p class="text-[8px] font-bold text-orange-400 uppercase truncate">${s.channelTitle}</p>
                                <h3 class="text-[9px] font-medium leading-tight line-clamp-2 text-white/90 my-1">${s.title}</h3>
                                <p class="text-[8px] text-blue-200 opacity-50 mt-auto">${s.publishedAt}</p>
                            </div>
                        </div>`;
                });

                setTimeout(() => { ajustarCorteLimpio(videoGrid); ajustarCorteLimpio(shortGrid); }, 500);
                window.addEventListener('resize', () => { ajustarCorteLimpio(videoGrid); ajustarCorteLimpio(shortGrid); });

            } catch (e) { console.error(e); }
        }
        init();
    </script>
</body>
</html>
