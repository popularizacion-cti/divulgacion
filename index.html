<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canales de divulgación científica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .concytec-blue { color: #003366; } /* Azul Institucional */
        .concytec-red { color: #e30613; } /* Rojo Institucional */
        .bg-concytec { background-color: #003366; }
        .card-video { transition: transform 0.2s ease; border-top: 4px solid #003366; }
        .card-video:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .card-short { border-top: 4px solid #e30613; }
    </style>
</head>
<body class="text-slate-800">

    <header class="bg-white border-b-4 border-red-600 shadow-sm py-12 px-4 mb-10 text-center">
        <h1 class="text-4xl md:text-5xl font-extrabold concytec-blue mb-4">Canales de divulgación científica</h1>
        <p class="text-lg md:text-xl text-slate-600 max-w-3xl mx-auto font-light">
            Videos más recientes de los canales de divulgación científica más reconocidos y populares.
        </p>
    </header>

    <main class="container mx-auto px-4 max-w-7xl">
        
        <section class="mb-16">
            <div class="flex items-center mb-8">
                <div class="bg-concytec w-2 h-8 mr-3"></div>
                <h2 class="text-3xl font-bold concytec-blue">Videos Recientes</h2>
            </div>
            <div id="grid-videos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                </div>
        </section>

        <section class="mb-20">
            <div class="flex items-center mb-8">
                <div class="bg-red-600 w-2 h-8 mr-3"></div>
                <h2 class="text-3xl font-bold concytec-blue">YouTube Shorts</h2>
            </div>
            <div id="grid-shorts" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
                </div>
        </section>

    </main>

    <script>
        async function loadContent() {
            try {
                const response = await fetch('videos.json?v=' + new Date().getTime());
                const data = await response.json();

                const videoGrid = document.getElementById('grid-videos');
                const shortGrid = document.getElementById('grid-shorts');

                // Render Videos
                data.videos.forEach(v => {
                    videoGrid.innerHTML += `
                        <div class="card-video bg-white rounded-lg overflow-hidden shadow-sm flex flex-col h-full">
                            <a href="${v.url}" target="_blank">
                                <img src="${v.backup_thumb}" onerror="this.src='${v.thumbnail}'" class="w-full aspect-video object-cover">
                                <div class="p-5">
                                    <p class="text-xs font-bold concytec-red uppercase mb-1">${v.channelTitle}</p>
                                    <h3 class="text-lg font-bold leading-tight mb-2 concytec-blue">${v.title}</h3>
                                    <p class="text-xs text-slate-500 mb-3 font-medium italic">Publicado el: ${v.publishedAt}</p>
                                    <p class="text-sm text-slate-600 line-clamp-3">${v.description}</p>
                                </div>
                            </a>
                        </div>
                    `;
                });

                // Render Shorts
                data.shorts.forEach(s => {
                    shortGrid.innerHTML += `
                        <div class="card-video card-short bg-white rounded-lg overflow-hidden shadow-sm flex flex-col">
                            <a href="${s.url}" target="_blank">
                                <img src="${s.backup_thumb}" class="w-full aspect-[9/16] object-cover">
                                <div class="p-3">
                                    <p class="text-[10px] font-bold concytec-red uppercase truncate">${s.channelTitle}</p>
                                    <h3 class="text-xs font-semibold leading-tight line-clamp-2 text-slate-700 mt-1">${s.title}</h3>
                                    <p class="text-[10px] text-slate-400 mt-1">${s.publishedAt}</p>
                                </div>
                            </a>
                        </div>
                    `;
                });

            } catch (e) {
                console.error("Error:", e);
            }
        }
        loadContent();
    </script>
</body>
</html>
