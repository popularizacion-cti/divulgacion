<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canales de divulgación científica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #1e6c93; color: white; margin: 0; padding: 0; scroll-behavior: smooth; }
        .accent-line { background-color: #ffd700; } 
        .card-video { background-color: rgba(255, 255, 255, 0.08); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.15); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); height: 100%; display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .card-video:hover { background-color: rgba(255, 255, 255, 0.12); transform: translateY(-8px); border-color: #ffd700; box-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
        
        /* Contenedores con espacio para la elevación de la primera fila */
        .grid-limited { overflow: hidden; transition: max-height 0.7s ease-in-out; max-height: 0; padding-top: 0.8rem; }
        .btn-toggle { cursor: pointer; color: #ffd700; font-weight: 600; text-decoration: underline; margin-top: 15px; display: inline-block; background: none; border: none; font-size: 0.95rem; }
        .section-header { cursor: pointer; user-select: none; display: flex; align-items: center; padding: 10px 0; }
        .section-header:hover h2 { color: #ffd700; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-4xl mx-auto text-center mb-6 border-b border-white/10 pb-4">
        <h1 class="text-2xl md:text-3xl font-bold mb-2 text-white uppercase tracking-tight">Canales de divulgación científica</h1>
    </header>

    <main class="max-w-5xl mx-auto">
        <section class="mb-8" id="sec-videos">
            <div class="section-header group" onclick="toggleSection('content-videos')">
                <div class="accent-line w-2 h-6 mr-4 rounded-full shadow-[0_0_10px_rgba(255,215,0,0.5)]"></div>
                <h2 class="text-lg font-bold tracking-wide transition-colors">Videos Recientes</h2>
            </div>
            <div id="content-videos" class="section-content">
                <div id="grid-videos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-8 grid-limited"></div>
                <button id="btn-more-videos" class="btn-toggle" onclick="expandGrid('grid-videos', this)">Ver más videos</button>
            </div>
        </section>

        <section class="mb-8" id="sec-shorts">
            <div class="section-header group" onclick="toggleSection('content-shorts')">
                <div class="w-2 h-6 mr-4 rounded-full bg-orange-500 shadow-[0_0_10px_rgba(255,165,0,0.5)]"></div>
                <h2 class="text-lg font-bold tracking-wide transition-colors">YouTube Shorts</h2>
            </div>
            <div id="content-shorts" class="section-content">
                <div id="grid-shorts" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-4 gap-4 grid-limited"></div>
                <button id="btn-more-shorts" class="btn-toggle" onclick="expandGrid('grid-shorts', this)">Ver más shorts</button>
            </div>
        </section>

        <section class="mb-8" id="sec-ingles-v">
            <div class="section-header group" onclick="toggleSection('content-ingles-v')">
                <div class="w-2 h-6 mr-4 rounded-full bg-white shadow-[0_0_10px_rgba(255,255,255,0.3)]"></div>
                <h2 class="text-lg font-bold tracking-wide transition-colors">Videos en Inglés</h2>
            </div>
            <div id="content-ingles-v" class="section-content">
                <div id="grid-ingles-v" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-8 grid-limited"></div>
                <button id="btn-more-ingles-v" class="btn-toggle" onclick="expandGrid('grid-ingles-v', this)">Ver más videos (EN)</button>
            </div>
        </section>

        <section class="mb-8" id="sec-ingles-s">
            <div class="section-header group" onclick="toggleSection('content-ingles-s')">
                <div class="w-2 h-6 mr-4 rounded-full bg-blue-300 shadow-[0_0_10px_rgba(147,197,253,0.5)]"></div>
                <h2 class="text-lg font-bold tracking-wide transition-colors">Shorts en Inglés</h2>
            </div>
            <div id="content-ingles-s" class="section-content">
                <div id="grid-ingles-s" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-4 gap-4 grid-limited"></div>
                <button id="btn-more-ingles-s" class="btn-toggle" onclick="expandGrid('grid-ingles-s', this)">Ver más shorts (EN)</button>
            </div>
        </section>
    </main>

    <script>
        const trackFilas = { "grid-videos": 2, "grid-shorts": 1, "grid-ingles-v": 2, "grid-ingles-s": 1 };
        let videoActivo = null;

        function toggleSection(id) {
            const content = document.getElementById(id);
            const btn = document.getElementById('btn-more-' + id.replace('content-', ''));
            
            if (content.style.display === "none") {
                content.style.display = "block";
                if(btn) btn.style.visibility = "visible";
                const grid = content.querySelector('.grid-limited');
                ajustarCorteLimpio(grid);
            } else {
                content.style.display = "none";
                if(btn) btn.style.visibility = "hidden";
            }
        }

        function expandGrid(gridId, btn) {
            const grid = document.getElementById(gridId);
            const isVideo = gridId.includes('-v') || gridId === 'grid-videos';
            
            if (btn.innerText === "Ocultar") {
                trackFilas[gridId] = isVideo ? 2 : 1;
                ajustarCorteLimpio(grid);
                btn.innerText = isVideo ? "Ver más videos" : "Ver más shorts";
                window.scrollTo({ top: grid.parentElement.parentElement.offsetTop - 50, behavior: 'smooth' });
                return;
            }

            const items = grid.children;
            const columns = window.innerWidth >= 1024 ? (isVideo ? 2 : 4) : (window.innerWidth >= 768 ? (isVideo ? 2 : 4) : (isVideo ? 1 : 2));
            const totalFilas = Math.ceil(items.length / columns);
            
            trackFilas[gridId] += isVideo ? 2 : 1;
            
            if (trackFilas[gridId] >= totalFilas) {
                grid.style.maxHeight = "none";
                btn.innerText = "Ocultar";
            } else {
                const indiceTarget = columns * trackFilas[gridId];
                if(items[indiceTarget]) {
                    grid.style.maxHeight = (items[indiceTarget].offsetTop - grid.offsetTop - 20) + "px";
                }
            }
        }

        function ajustarCorteLimpio(grid) {
            const isVideo = grid.id.includes('-v') || grid.id === 'grid-videos';
            const items = grid.children;
            const columns = window.innerWidth >= 1024 ? (isVideo ? 2 : 4) : (window.innerWidth >= 768 ? (isVideo ? 2 : 4) : (isVideo ? 1 : 2));
            const filasInicales = isVideo ? 2 : 1;

            if (items.length > columns * filasInicales) {
                grid.style.maxHeight = (items[columns * filasInicales].offsetTop - grid.offsetTop - 18) + "px";
            } else {
                grid.style.maxHeight = "none";
                const btn = document.getElementById('btn-more-' + grid.id.replace('grid-', ''));
                if(btn) btn.style.display = 'none';
            }
        }

        function reemplazarPorVideo(contenedor, videoId) {
            if (videoActivo && videoActivo !== contenedor) {
                const thumb = videoActivo.getAttribute('data-thumb');
                videoActivo.innerHTML = `<img src="${thumb}" class="absolute w-full h-full object-cover opacity-70 group-hover:opacity-100 transition-opacity"><div class="absolute inset-0 flex items-center justify-center"><div class="w-12 h-12 bg-red-600 rounded-full flex items-center justify-center group-hover:scale-110 transition-transform"><svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>`;
            }
            if (!contenedor.getAttribute('data-video-id')) {
                contenedor.setAttribute('data-video-id', videoId);
                contenedor.setAttribute('data-thumb', contenedor.querySelector('img').src);
            }
            contenedor.innerHTML = `<iframe class="absolute top-0 left-0 w-full h-full" src="https://www.youtube.com/embed/${videoId}?autoplay=1" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
            videoActivo = contenedor;
        }

        async function init() {
            try {
                const response = await fetch('videos.json?v=' + new Date().getTime());
                const data = await response.json();
                
                const render = (containerId, list, isShort) => {
                    const grid = document.getElementById(containerId);
                    if(!list || list.length === 0) {
                        grid.parentElement.parentElement.style.display = 'none';
                        return;
                    }
                    list.forEach(v => {
                        grid.innerHTML += `
                            <div class="card-video rounded-xl overflow-hidden shadow-lg">
                                <div class="relative ${isShort ? 'aspect-[9/16]' : 'aspect-video'} bg-black cursor-pointer group video-facade" tabindex="0" onclick="reemplazarPorVideo(this, '${v.videoId}')">
                                    <img src="${isShort ? v.backup_thumb : v.thumbnail}" onerror="this.src='${v.backup_thumb}'" class="absolute w-full h-full object-cover opacity-70 group-hover:opacity-100 transition-opacity">
                                    <div class="absolute inset-0 flex items-center justify-center"><div class="${isShort ? 'w-8 h-8' : 'w-12 h-12'} bg-red-600 rounded-full flex items-center justify-center group-hover:scale-110 transition-transform"><svg class="${isShort ? 'w-4 h-4' : 'w-6 h-6'} text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>
                                </div>
                                <div class="p-4 flex-grow flex flex-col">
                                    <p class="text-[9px] font-bold text-${isShort ? 'orange-400' : 'yellow-400'} uppercase mb-1 tracking-wider">${v.channelTitle}</p>
                                    <a href="${v.url}" target="_blank" class="hover:text-yellow-400"><h3 class="text-sm font-semibold leading-tight line-clamp-2 mb-2">${v.title}</h3></a>
                                    <p class="text-[9px] text-blue-200 italic mt-auto border-t border-white/5 pt-2">Publicado: ${v.publishedAt}</p>
                                </div>
                            </div>`;
                    });
                };

                render('grid-videos', data.videos, false);
                render('grid-shorts', data.shorts, true);
                render('grid-ingles-v', data.ingles_v, false);
                render('grid-ingles-s', data.ingles_s, true);

                setTimeout(() => { 
                    ['grid-videos', 'grid-shorts', 'grid-ingles-v', 'grid-ingles-s'].forEach(id => {
                        const grid = document.getElementById(id);
                        if(grid.innerHTML !== "") ajustarCorteLimpio(grid);
                    });
                }, 600);
            } catch (e) { console.error(e); }
        }
        init();
    </script>
</body>
</html>
